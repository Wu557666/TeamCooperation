<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D工业模型展示 - 修复黑暗版</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        /* 卡片样式（与之前一致，简洁） */
        .card {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 500px;
            background: rgba(25, 28, 35, 0.95);
            backdrop-filter: blur(16px);
            border-radius: 32px;
            padding: 28px 24px 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            z-index: 300;
            color: #f0f3f8;
            border: 1px solid rgba(255,255,255,0.2);
            text-align: center;
        }
        .card h2 { margin-top: 0; margin-bottom: 20px; font-size: 1.8rem; background: linear-gradient(135deg, #fff, #aad0ff); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .welcome-buttons { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; margin-top: 20px; }
        .welcome-buttons button, .back-btn {
            background: rgba(58, 110, 165, 0.9);
            border: none;
            color: white;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid rgba(255,255,255,0.25);
        }
        .welcome-buttons button:hover, .back-btn:hover { background: #ffaa00; color: #1e1e1e; transform: scale(1.02); }
        .back-btn { background: rgba(0,0,0,0.6); margin-top: 12px; padding: 8px 20px; }
        #model-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(30,30,40,0.85);
            backdrop-filter: blur(12px);
            padding: 12px 20px;
            border-radius: 60px;
            z-index: 150;
            display: flex;
            gap: 12px;
            border: 1px solid #555;
        }
        .model-btn {
            background: #3a6ea5;
            border: none;
            color: white;
            padding: 8px 22px;
            border-radius: 40px;
            font-size: 14px;
            cursor: pointer;
            font-weight: bold;
        }
        .model-btn.active { background: #ffaa00; color: #1e1e1e; }
        #slider-container {
            position: absolute;
            bottom: 30px;
            left: 20px;
            background: rgba(30,30,40,0.85);
            backdrop-filter: blur(12px);
            padding: 12px 24px;
            border-radius: 48px;
            display: flex;
            align-items: center;
            gap: 18px;
            z-index: 150;
            color: white;
        }
        #scale-slider { width: 220px; accent-color: #ffaa00; }
        #scale-value { font-weight: bold; color: #ffaa00; min-width: 50px; background: #00000066; padding: 4px 8px; border-radius: 30px; }
        .hint {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: rgba(255,255,255,0.7);
            font-size: 12px;
            background: rgba(0,0,0,0.5);
            padding: 6px 14px;
            border-radius: 40px;
            pointer-events: none;
            z-index: 100;
        }
        .hidden { display: none !important; }
        #info {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: #0ff;
            padding: 6px 16px;
            border-radius: 20px;
            z-index: 300;
            font-size: 14px;
            font-family: monospace;
            pointer-events: none;
            white-space: nowrap;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #fefefe;
            padding: 20px;
            border-radius: 15px;
            width: 380px;
            max-width: 85vw;
            position: relative;
        }
        .close { position: absolute; top: 10px; right: 15px; font-size: 28px; cursor: pointer; }
        .modal-title { color: #2c3e50; margin-top: 0; }
        #back-from-global {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            border: 1px solid #ffaa55;
            color: white;
            padding: 6px 18px;
            border-radius: 40px;
            cursor: pointer;
            z-index: 200;
        }
        .download-links {
            position: fixed;
            bottom: 18px;
            left: 20px;
            background: rgba(0,0,0,0.5);
            padding: 6px 15px;
            border-radius: 40px;
            font-size: 11px;
            display: flex;
            gap: 12px;
            z-index: 180;
        }
        .download-links a { color: #ccc; text-decoration: none; }

        /* 模型切换面板 */
        #model-panel {
            position: absolute; top: 20px; right: 20px;
            background: rgba(30,30,30,0.85);
            backdrop-filter: blur(8px);
            padding: 15px 20px;
            border-radius: 40px;
            border: 1px solid #444;
            z-index: 150;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .model-btn {
            background: #3a6ea5;
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
            font-weight: bold;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .model-btn:hover { background: #2c4f7a; }
        .model-btn.active {
            background: #ffaa00;
            color: #1e1e1e;
        }

        /* 缩放滑块 */
        #slider-container {
            position: absolute; bottom: 30px; left: 20px;
            background: rgba(30,30,30,0.8); color: white;
            padding: 15px 25px; border-radius: 40px;
            backdrop-filter: blur(8px); border: 1px solid #444;
            z-index: 150; display: flex; align-items: center; gap: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        #slider-container label { font-size: 14px; color: #ddd; }
        #scale-slider { width: 250px; cursor: pointer; }
        #scale-value { font-weight: bold; color: #ffaa00; min-width: 50px; text-align: right; }

        .hint {
            position: absolute; bottom: 20px; right: 20px;
            color: rgba(255,255,255,0.6); font-size: 13px; z-index: 100;
            background: rgba(0,0,0,0.3); padding: 4px 12px; border-radius: 20px;
            backdrop-filter: blur(4px); pointer-events: none;
        }
        .hidden { display: none !important; }

        /* 加载信息 */
        #info {
            position: absolute; top: 20px; left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: #0ff;
            padding: 8px 16px;
            border-radius: 20px;
            z-index: 300;
            font-size: 14px;
            backdrop-filter: blur(4px);
            border: 1px solid #00ffff33;
        }
    </style>
</head>
<body>
    <!-- 加载信息 -->
    <div id="info">⏳ 准备就绪</div>

    <!-- 欢迎卡片 -->
    <div id="welcome-card" class="card">
        <h2>✨ 欢迎使用模型展示</h2>
        <div class="welcome-buttons">
            <button id="btn-model">📦 3D模型</button>
            <button id="btn-reason">❓ 设计溯源</button>
            <button id="btn-team">👥 团队成员</button>
        </div>
       <p style="font-size:0.8rem; margin-top:20px;">点击探索我们的项目</p>
    </div>

    <!-- 原因卡片（可自定义内容） -->
    <div id="reason-card" class="card hidden">
        <h2>❓ 原因说明</h2>
        <div class="text-content">

                <li>清洁能源可视化，助力碳中和科普</li>
                <li>融合风力、水力、海洋平台三大场景</li>
                <li>3</li>

            </ul>

        </div>
        <button class="back-btn" id="back-from-reason">← 返回主页</button>
    </div>

    <!-- 团队成员卡片（可自定义内容） -->
    <div id="team-card" class="card hidden">
        <h2>👥 团队成员</h2>
        <div class="text-content">
            <p><strong>it</strong></p>
            <p><strong>just</strong></p>
            <p><strong>a</strong></p>
            <p><strong>test</strong></p>
            <p><strong>to</strong></p>
            <p><strong>show</strong></p>
            <p><strong>our</strong></p>
            <p><strong>program</strong></p>
            <p><strong>网</strong></p>
            <p><strong>页</strong></p>
            <a>共位</a>
        </div>
        <button class="back-btn" id="back-from-team">← 返回主页</button>
    </div>

    <!-- 模型切换面板（点击“模型”后显示） -->
    <div id="model-panel" class="hidden">
        <button class="model-btn" data-model="wind.glb">风力发电</button>
        <button class="model-btn" data-model="platform.glb">平台</button>
        <button class="model-btn" data-model="water.glb">水利发电(单个)</button>
        <!-- 你可以根据需要增加更多按钮，并创建对应的GLB文件 -->
    </div>
   <div class="download-links">
        <a href="wind.glb" download>📥 风力模型下载</a>
        <a href="platform.glb" download>📥 平台模型下载</a>
        <a href="water.glb" download>📥 波浪模型下载</a>
    </div>
    <button class="back-btn" id="back-from-global">← 返回主页</button>
    <!-- 缩放滑块 -->
    <div id="slider-container" class="hidden">
        <label for="scale-slider">缩放倍数:</label>
        <input type="range" id="scale-slider" min="1" max="2000" value="200" step="1">
        <span id="scale-value">200</span>
    </div>

    <div class="hint">🖱️ 左键拖动旋转 | 滚轮缩放 | 右键拖动模型</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import {OrbitControls} from 'three/addons/controls/OrbitControls.js';
        import {GLTFLoader} from 'three/addons/loaders/GLTFLoader.js';

        // --- 初始化场景、相机、渲染器 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111122); // 深色背景

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100000);
        camera.position.set(10, 10, 20);

        const renderer = new THREE.WebGLRenderer({antialias: true});
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 0, 0);

        // --- 灯光（充分照亮）---
        const ambientLight = new THREE.AmbientLight(0xffffff, 1.0);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(5, 10, 7);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        const d = 15;
        dirLight.shadow.camera.left = -d;
        dirLight.shadow.camera.right = d;
        dirLight.shadow.camera.top = d;
        dirLight.shadow.camera.bottom = -d;
        dirLight.shadow.camera.near = 1;
        dirLight.shadow.camera.far = 30;
        scene.add(dirLight);

        const backLight = new THREE.DirectionalLight(0xffffff, 0.8);
        backLight.position.set(-5, 0, 5);
        scene.add(backLight);

        const gridHelper = new THREE.GridHelper(30, 20, 0x88aaff, 0x335588);
        gridHelper.position.y = -2.2;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.35;
        scene.add(gridHelper);

        // 简单的地面反射平面 (透明)
        const groundPlane = new THREE.Mesh(
            new THREE.PlaneGeometry(25, 25),
            new THREE.MeshStandardMaterial({ color: 0x112233, roughness: 0.7, metalness: 0.1, transparent: true, opacity: 0.2 })
        );
        groundPlane.rotation.x = -Math.PI / 2;
        groundPlane.position.y = -2.4;
        groundPlane.receiveShadow = true;
        scene.add(groundPlane);


        // --- 模型管理 ---
        const loader = new GLTFLoader();
        let currentModel = null;
        const modelCache = new Map();

        // 自适应相机函数：根据模型包围盒自动调整相机位置
        function fitCameraToModel(model) {
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            const diagonal = size.length();

            if (diagonal > 0) {
                // 距离系数设为对角线长度的 2.5 倍，可根据需要调整（越大越远）
                const distance = diagonal * 2.5;
                const direction = new THREE.Vector3(1, 1, 1).normalize();
                camera.position.copy(center.clone().add(direction.multiplyScalar(distance)));
                controls.target.copy(center);
                controls.update();
                console.log('自适应相机: 中心', center, '对角线', diagonal);
            }
        }

        // 加载并显示模型
        function loadModel(path) {
            const infoDiv = document.getElementById('info');
            if (currentModel) scene.remove(currentModel);

            if (modelCache.has(path)) {
                currentModel = modelCache.get(path);
                scene.add(currentModel);
                fitCameraToModel(currentModel);
                infoDiv.textContent = `✅ 已加载 (缓存)`;
                return;
            }

            infoDiv.textContent = `⏳ 加载中...`;
            loader.load(
                path,
                (gltf) => {
                    const model = gltf.scene;

                    // 材质设置：银白色金属，结构清晰
                    model.traverse((node) => {
                        if (node.isMesh) {
                            node.material = new THREE.MeshStandardMaterial({
                                color: 0xe0e0e0,
                                roughness: 0.4,
                                metalness: 0.9,
                                emissive: 0x000000
                            });
                            node.castShadow = true;
                            node.receiveShadow = true;
                        }
                    });

                    // 设置初始缩放（滑块会覆盖）
                    model.scale.set(200, 200, 200); // 可根据需要修改，例如毫米单位需设为 0.001

                    modelCache.set(path, model);
                    currentModel = model;
                    scene.add(model);

                    infoDiv.textContent = '✅ 已加载' ;
                    fitCameraToModel(model); // 自适应相机

                    // 同步滑块值
                    slider.value = model.scale.x;
                    valueSpan.textContent = model.scale.x;
                },
                (xhr) => {
                    const percent = (xhr.loaded / xhr.total * 100).toFixed(0);
                    infoDiv.textContent = `⏳ 加载 ${path}: ${percent}%`;
                },
                (error) => {
                    infoDiv.textContent = `❌ 加载 ${path} 失败`;
                    console.error('加载错误:', error);
                }
            );
        }

        // --- 缩放滑块控制 ---
        const slider = document.getElementById('scale-slider');
        const valueSpan = document.getElementById('scale-value');
        slider.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            valueSpan.textContent = val;
            if (currentModel) {
                currentModel.scale.set(val, val, val);
            }
        });

        // --- 卡片切换逻辑 ---
        const welcomeCard = document.getElementById('welcome-card');
        const reasonCard = document.getElementById('reason-card');
        const teamCard = document.getElementById('team-card');
        const modelPanel = document.getElementById('model-panel');
        const sliderContainer = document.getElementById('slider-container');

        const btnModel = document.getElementById('btn-model');
        const btnReason = document.getElementById('btn-reason');
        const btnTeam = document.getElementById('btn-team');
        const backReason = document.getElementById('back-from-reason');
        const backTeam = document.getElementById('back-from-team');
        const backGlobal = document.getElementById('back-from-global');

        function hideAllCards() {
            welcomeCard.classList.add('hidden');
            reasonCard.classList.add('hidden');
            teamCard.classList.add('hidden');
        }

        function showWelcome() {
            hideAllCards();
            welcomeCard.classList.remove('hidden');
            modelPanel.classList.add('hidden');
            sliderContainer.classList.add('hidden');
        }

        function showModel() {
            hideAllCards();
            modelPanel.classList.remove('hidden');
            sliderContainer.classList.remove('hidden');
            // 如果还没有加载任何模型，默认加载第一个
            if (!currentModel && modelButtons.length > 0) {
                modelButtons[0].click();
            }
        }

        function showReason() {
            hideAllCards();
            reasonCard.classList.remove('hidden');
            modelPanel.classList.add('hidden');
            sliderContainer.classList.add('hidden');
        }

        function showTeam() {
            hideAllCards();
            teamCard.classList.remove('hidden');
            modelPanel.classList.add('hidden');
            sliderContainer.classList.add('hidden');
        }

        btnModel.addEventListener('click', showModel);
        btnReason.addEventListener('click', showReason);
        btnTeam.addEventListener('click', showTeam);
        backReason.addEventListener('click', showWelcome);
        backTeam.addEventListener('click', showWelcome);
        backGlobal.addEventListener('click', showWelcome);

        // --- 模型切换按钮绑定 ---
        const modelButtons = document.querySelectorAll('.model-btn');
        modelButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                const path = btn.dataset.model;
                loadModel(path);
                modelButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });

        // --- 动画循环 ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        animate();

        // --- 窗口自适应 ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });


    </script>
<<script>
(function() {
    // 等待页面完全加载
    window.addEventListener('load', function() {
        // 获取所有带有 data-model 属性的按钮
        var btns = document.querySelectorAll('[data-model]');
        for (var i = 0; i < btns.length; i++) {
            var btn = btns[i];
            // 保存原有的点击事件（如果有）
            var oldClick = btn.onclick;
            // 添加新的点击事件（不会覆盖原有的）
            btn.addEventListener('click', function(e) {
                var path = this.getAttribute('data-model');
                // 弹窗内容
                var title = '', text = '';
                if (path === 'wind.glb') {
                    title = '风力发电';
                    text = '三叶片设计，将风能转化为电能。';
                } else if (path === 'platform.glb') {
                    title = '海洋平台';
                    text = '主要结构负载';
                } else if (path === 'water.glb') {
                    title = '水力发电';
                    text = '利用波浪起伏发电';
                }
                if (title) {
                    // 创建或显示弹窗
                    showSimpleModal(title, text);
                }
            });
        }
    });

    // 弹窗函数（自动创建，不会冲突）
    function showSimpleModal(title, text) {
        var modal = document.getElementById('safeModal');
        if (!modal) {
            modal = document.createElement('div');
            modal.id = 'safeModal';
            modal.style.cssText = 'display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:100000; justify-content:center; align-items:center;';
            modal.innerHTML = '<div style="background:white; padding:20px; border-radius:10px; width:300px; text-align:center;"><h3 id="safeModalTitle"></h3><p id="safeModalText"></p><button onclick="document.getElementById(\'safeModal\').style.display=\'none\'">关闭</button></div>';
            document.body.appendChild(modal);
        }
        document.getElementById('safeModalTitle').innerText = title;
        document.getElementById('safeModalText').innerText = text;
        modal.style.display = 'flex';
    }
})();
</script>
</body>
</html>
